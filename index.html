<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG - Freestyle Opening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #020617; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .pack-container { perspective: 2000px; position: relative; height: 500px; width: 340px; margin: 0 auto; }
        .tcg-card {
            position: absolute; width: 100%; height: 100%;
            cursor: grab; touch-action: none; user-select: none;
            will-change: transform;
        }
        .card-inner {
            width: 100%; height: 100%; border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 4px solid #1e293b; background: #000; overflow: hidden;
        }
        #result-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; flex-direction: column; align-items: center; 
            padding: 40px 20px; overflow-y: auto; backdrop-filter: blur(15px);
        }
        .card-list-item { animation: slideUp 0.4s ease forwards; opacity: 0; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-white flex flex-col items-center min-h-screen">

    <div class="mt-8 text-center px-4">
        <h1 class="text-3xl font-black text-blue-500 tracking-widest uppercase">Pack Simulator</h1>
        <p class="text-gray-500 text-xs mt-1 italic">Hất thẻ theo bất kỳ hướng nào để khám phá</p>
    </div>

    <div class="mt-10 flex flex-col items-center gap-8">
        <button id="btn-open" class="bg-blue-700 hover:bg-blue-600 px-12 py-4 rounded-2xl font-bold text-lg shadow-xl border-b-4 border-blue-900 active:border-b-0 active:translate-y-1 transition-all">
            LẤY PACK MỚI
        </button>

        <div id="pack-area" class="pack-container">
            </div>
    </div>

    <div id="result-screen">
        <h2 class="text-yellow-500 font-bold text-xl mb-2">TỔNG GIÁ TRỊ PACK</h2>
        <div id="final-total" class="text-6xl font-black mb-8 text-green-400 font-mono tracking-tighter">$0.00</div>
        
        <div class="w-full max-w-md space-y-3 mb-10" id="card-history">
            </div>

        <button onclick="location.reload()" class="bg-white text-black font-bold px-10 py-3 rounded-xl hover:bg-gray-200 transition-colors">
            THỬ LẠI
        </button>
    </div>

    <script>
        const packArea = document.getElementById('pack-area');
        const btnOpen = document.getElementById('btn-open');
        const resultScreen = document.getElementById('result-screen');
        const historyContainer = document.getElementById('card-history');
        const finalTotalEl = document.getElementById('final-total');

        let openedCards = [];
        let cardsLeft = 0;
        let totalVal = 0;

        const CHANCES = { 'ACE SPEC Rare': 0.05, 'Ultra Rare': 0.07, 'Illustration Rare': 0.08, 'Double Rare': 0.17 };

        async function fetchCard(rarity) {
            try {
                const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:sv1 rarity:"${rarity}"&pageSize=40`);
                const data = await res.json();
                return data.data[Math.floor(Math.random() * data.data.length)];
            } catch { return null; }
        }

        async function initPack() {
            btnOpen.disabled = true;
            btnOpen.innerText = "ĐANG TẢI...";
            packArea.innerHTML = '';
            openedCards = [];
            totalVal = 0;
            cardsLeft = 10;

            const promises = [];
            for(let i=0; i<9; i++) promises.push(fetchCard(Math.random() > 0.4 ? 'Common' : 'Uncommon'));
            
            let roll = Math.random();
            let r = 'Rare';
            if (roll < CHANCES['ACE SPEC Rare']) r = 'ACE SPEC Rare';
            else if (roll < CHANCES['Ultra Rare']) r = 'Ultra Rare';
            else if (roll < CHANCES['Illustration Rare']) r = 'Illustration Rare';
            else if (roll < CHANCES['Double Rare']) r = 'Double Rare';
            promises.push(fetchCard(r));

            const results = await Promise.all(promises);
            results.forEach((card, i) => {
                if(!card) return;
                const price = card.tcgplayer?.prices?.holofoil?.market || card.tcgplayer?.prices?.normal?.market || 0.10;
                openedCards.push({ name: card.name, price, rarity: card.rarity });
                totalVal += price;
                renderCard(card, i);
            });

            btnOpen.disabled = false;
            btnOpen.innerText = "LẤY PACK MỚI";
        }

        function renderCard(card, index) {
            const div = document.createElement('div');
            div.className = 'tcg-card';
            div.style.zIndex = index;
            div.innerHTML = `<div class="card-inner"><img src="${card.images.large}" class="w-full h-full object-cover pointer-events-none"></div>`;
            
            setupFreestyleDrag(div, card.rarity);
            packArea.appendChild(div);
        }

        function setupFreestyleDrag(el, rarity) {
            let startX, startY, moveX, moveY;

            const start = (e) => {
                const pos = e.touches ? e.touches[0] : e;
                startX = pos.clientX;
                startY = pos.clientY;
                el.style.transition = 'none';
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', end);
                document.addEventListener('touchmove', move);
                document.addEventListener('touchend', end);
            };

            const move = (e) => {
                const pos = e.touches ? e.touches[0] : e;
                moveX = pos.clientX - startX;
                moveY = pos.clientY - startY;
                const rotate = moveX / 10;
                el.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${rotate}deg)`;
            };

            const end = () => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', end);
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);

                // Nếu kéo đủ xa theo bất kỳ hướng nào (X hoặc Y)
                if (Math.abs(moveX) > 130 || Math.abs(moveY) > 130) {
                    const angle = Math.atan2(moveY, moveX);
                    const velocity = 1500;
                    const endX = Math.cos(angle) * velocity;
                    const endY = Math.sin(angle) * velocity;

                    el.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.5, 0.2, 1)';
                    el.style.transform = `translate(${endX}px, ${endY}px) rotate(${endX/10}deg)`;
                    
                    if(rarity.includes('Rare') || rarity.includes('ACE')) {
                        confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
                    }

                    setTimeout(() => {
                        el.remove();
                        cardsLeft--;
                        if(cardsLeft === 0) finish();
                    }, 400);
                } else {
                    el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    el.style.transform = 'translate(0,0) rotate(0deg)';
                }
            };

            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
        }

        function finish() {
            finalTotalEl.innerText = `$${totalVal.toFixed(2)}`;
            historyContainer.innerHTML = openedCards.map((c, i) => `
                <div class="card-list-item flex justify-between bg-gray-900 p-3 rounded-lg border-l-4 ${c.rarity.includes('Rare') ? 'border-yellow-500' : 'border-blue-500'}" style="animation-delay: ${i*0.1}s">
                    <span class="text-sm font-medium">${c.name}</span>
                    <span class="font-mono text-green-400 font-bold">$${c.price.toFixed(2)}</span>
                </div>
            `).join('');
            
            resultScreen.style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.5 } });
        }

        btnOpen.addEventListener('click', initPack);
    </script>
</body>
</html>
