<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Pack Simulator - Anonymous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pokemon-card { transition: transform 0.3s; }
        .pokemon-card:hover { transform: scale(1.05); }
        .rarity-star { color: #f1c40f; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-4xl font-bold text-yellow-400 mb-4">Pokemon Pack Opener</h1>
        <p class="text-gray-400 mb-8">Mọi người đều có thể mở pack ẩn danh và xem giá thị trường.</p>

        <button id="open-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg transition transform active:scale-95 mb-10">
            Mở Pack (Scarlet & Violet)
        </button>

        <div id="loading" class="hidden text-xl text-yellow-500 animate-pulse">Đang khui pack...</div>
        
        <div id="result-info" class="hidden mb-6">
            <h2 class="text-2xl font-semibold">Tổng giá trị: <span id="total-price" class="text-green-400">$0.00</span></h2>
        </div>

        <div id="card-display" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            </div>
    </div>

    <script>
        const openBtn = document.getElementById('open-btn');
        const cardDisplay = document.getElementById('card-display');
        const totalPriceEl = document.getElementById('total-price');
        const resultInfo = document.getElementById('result-info');
        const loading = document.getElementById('loading');

        async function openPack() {
            loading.classList.remove('hidden');
            cardDisplay.innerHTML = '';
            resultInfo.classList.add('hidden');
            
            try {
                // Gọi API lấy ngẫu nhiên thẻ từ set Scarlet & Violet (sv1)
                const response = await fetch('https://api.pokemontcg.io/v2/cards?q=set.id:sv1&pageSize=10');
                const data = await response.json();
                const cards = data.data;

                // Xáo trộn ngẫu nhiên để giả lập mở pack
                const shuffled = cards.sort(() => 0.5 - Math.random());
                let total = 0;

                shuffled.forEach(card => {
                    const price = card.tcgplayer?.prices?.holofoil?.market || card.tcgplayer?.prices?.normal?.market || 0;
                    total += price;

                    const cardHtml = `
                        <div class="pokemon-card bg-gray-800 p-3 rounded-lg border border-gray-700 shadow-xl">
                            <img src="${card.images.small}" alt="${card.name}" class="w-full rounded-md mb-2">
                            <h3 class="font-bold text-sm truncate">${card.name}</h3>
                            <p class="text-green-400 font-mono mt-1">$${price.toFixed(2)}</p>
                            <p class="text-xs text-gray-500 mt-1">${card.rarity || 'Common'}</p>
                        </div>
                    `;
                    cardDisplay.innerHTML += cardHtml;
                });

                totalPriceEl.innerText = `$${total.toFixed(2)}`;
                resultInfo.classList.remove('hidden');
            } catch (error) {
                alert('Có lỗi xảy ra khi kết nối API!');
            } finally {
                loading.classList.add('hidden');
            }
        }

        openBtn.addEventListener('click', openPack);
    </script>
</body>
</html>
