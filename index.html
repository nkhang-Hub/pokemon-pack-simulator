<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePack HighSpeed Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="text-white">

    <header class="py-6">
        <h1 class="text-2xl font-black text-center text-blue-500 italic uppercase tracking-tighter">Ultra Fast Pack Opener</h1>
    </header>

    <div class="controls-container">
        <select id="set-picker">
            <option value="sv6">Twilight Masquerade</option>
            <option value="sv5">Temporal Forces</option>
            <option value="sv4pt5">Paldean Fates</option>
            <option value="swsh12">Silver Tempest</option>
        </select>
        <button id="btn-open">MỞ PACK (QUICK)</button>
    </div>

    <div id="deck-container" class="pack-viewport">
        <div class="placeholder-text">Chọn bộ và bấm mở để bắt đầu</div>
    </div>

    <div id="summary-screen">
        <div class="summary-content">
            <p class="label">TỔNG GIÁ TRỊ</p>
            <div id="total-price-text" class="price-big">$0.00</div>
            <div id="history-list" class="history-grid"></div>
            <button onclick="resetApp()" class="btn-reset">MỞ TIẾP TỤC</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
